# Blue-Green upstream configuration
# Active backend - switch between blue and green during deployment
upstream backend_active {
    server backend-blue:4000;
}

# Standby backend (used by deploy script for health checks)
upstream backend_standby {
    server backend-green:4000;
}

# Admin web upstream
upstream admin_web {
    server admin-web:80;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check (allow without redirect for Docker healthcheck)
    location /health {
        proxy_pass http://backend_active/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/busync.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/busync.kr/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Max upload size
    client_max_body_size 10M;

    # API requests -> active backend
    location /api {
        # 엣지 백스톱: 평균 30r/s, 순간 버스트 60 까지 허용(정상 SPA 로드 보호), 동시연결 64 제한.
        # 세밀한 로그인/OTP 제한은 백엔드(Redis 기반)가 담당.
        limit_req zone=api_limit burst=60 nodelay;
        limit_conn conn_limit 64;

        proxy_pass http://backend_active;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://backend_active/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # WebSocket support for real-time features
    location /socket.io {
        proxy_pass http://backend_active;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin web (SPA)
    location / {
        proxy_pass http://admin_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Nginx status (internal only)
    location /nginx-status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production (blue-green)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install backend dependencies
        run: cd packages/backend && npm ci
      - name: Install admin-web dependencies
        run: cd packages/admin-web && npm ci
      - name: Generate Prisma client
        run: cd packages/backend && npx prisma generate
      - name: TypeScript check (backend)
        run: cd packages/backend && npx tsc --noEmit
      - name: TypeScript check (backend scripts — backtest CLIs)
        run: cd packages/backend && npx tsc --noEmit -p tsconfig.scripts.json
      - name: TypeScript check (admin-web)
        run: cd packages/admin-web && npx tsc --noEmit

  mobile-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install root deps (workspaces)
        run: npm install --legacy-peer-deps
      - name: TypeScript check (mobile)
        run: cd packages/mobile && npx tsc --noEmit

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: busync_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: cd packages/backend && npm ci
      - run: cd packages/backend && npx prisma generate
      - name: Run migrations
        run: cd packages/backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/busync_test
      - name: Run tests
        run: cd packages/backend && npm test -- --coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/busync_test
          JWT_SECRET: test-secret-key-that-is-long-enough-for-validation
          ANTHROPIC_API_KEY: test-key
          NODE_ENV: test

  build-admin:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: cd packages/admin-web && npm ci
      - name: Build admin web
        run: cd packages/admin-web && npm run build

  # 백테스트 파이프라인 무결성 검증 (StubAgent 사용 — Anthropic API 키 불필요)
  # 시나리오 생성기 → 도구 호출 → DB 변경 → 측정 → 정리 전체 흐름 검증
  smoke-backtest:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: busync_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/busync_test
      JWT_SECRET: test-secret-key-that-is-long-enough-for-validation
      ANTHROPIC_API_KEY: sk-ant-ci-stub-not-used-by-stubagent
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: cd packages/backend && npm ci
      - run: cd packages/backend && npx prisma generate
      - name: Run migrations
        run: cd packages/backend && npx prisma migrate deploy
      - name: EmergencyAgent smoke backtest (StubAgent)
        run: cd packages/backend && npm run backtest:emergency -- --smoke --drops=10
      - name: DispatchAgent smoke backtest (StubAgent)
        run: cd packages/backend && npm run backtest:dispatch -- --smoke --scenarios=2

  e2e-admin:
    runs-on: ubuntu-latest
    needs: build-admin
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: busync_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install backend dependencies
        run: cd packages/backend && npm ci
      - name: Generate Prisma client
        run: cd packages/backend && npx prisma generate
      - name: Run migrations
        run: cd packages/backend && npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/busync_test
      - name: Seed database
        run: cd packages/backend && npx prisma db seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/busync_test
          JWT_SECRET: test-secret-key-that-is-long-enough-for-validation
          ANTHROPIC_API_KEY: test-key
          NODE_ENV: test
      - name: Start backend
        run: cd packages/backend && npm run dev &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/busync_test
          JWT_SECRET: test-secret-key-that-is-long-enough-for-validation
          ANTHROPIC_API_KEY: test-key
          NODE_ENV: test
          PORT: 4000
      - name: Install admin-web dependencies
        run: cd packages/admin-web && npm ci
      - name: Install Playwright browsers
        run: cd packages/admin-web && npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: cd packages/admin-web && npm run test:e2e
        env:
          CI: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: packages/admin-web/playwright-report/
          retention-days: 30

  # Blue-Green 배포 (수동 트리거)
  deploy:
    runs-on: ubuntu-latest
    needs: [test-backend, build-admin, smoke-backtest]
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose -f docker-compose.prod.yml build

      - name: Start infrastructure services
        run: docker compose -f docker-compose.prod.yml up -d postgres redis nginx admin-web

      - name: Wait for infrastructure
        run: |
          echo "Waiting for postgres and redis..."
          sleep 10
          docker compose -f docker-compose.prod.yml ps

      - name: Run blue-green deployment
        run: ./scripts/deploy.sh

      - name: Verify deployment
        run: |
          ACTIVE=$(cat .current-color)
          echo "Active instance: $ACTIVE"
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml exec "backend-$ACTIVE" wget --no-verbose --tries=1 --spider http://localhost:4000/health

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: busync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-busync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-busync_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-busync_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busync -d busync_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: busync_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: busync_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-busync}:${POSTGRES_PASSWORD:-busync_dev_password}@postgres:5432/${POSTGRES_DB:-busync_db}
      JWT_SECRET: ${JWT_SECRET:-change_this_super_secret_key_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/backend:/app
      - /app/node_modules

  admin-web:
    build:
      context: ./packages/admin-web
      dockerfile: Dockerfile
    container_name: busync_admin
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ─── DB 자동 백업 (매일 새벽 3시) ───
  db-backup:
    image: postgres:16-alpine
    container_name: busync_backup
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-busync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-busync_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-busync_db}
      SLACK_BACKUP_WEBHOOK: ${SLACK_BACKUP_WEBHOOK:-}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: >
      sh -c "
        echo 'DB 백업 서비스 시작 (매일 03:00)';
        while true; do
          NEXT_RUN=$(date -d 'tomorrow 03:00' +%s 2>/dev/null || date -v+1d -v3H -v0M -v0S +%s);
          NOW=$(date +%s);
          SLEEP_SEC=$((NEXT_RUN - NOW));
          sleep $${SLEEP_SEC};
          TS=$(date +%Y%m%d_%H%M%S);
          FNAME=${POSTGRES_DB:-busync_db}_$${TS}.sql.gz;
          PGPASSWORD=${POSTGRES_PASSWORD:-busync_dev_password} pg_dump \
            -h postgres -U ${POSTGRES_USER:-busync} -d ${POSTGRES_DB:-busync_db} \
            --clean --if-exists | gzip > /backups/$${FNAME};
          echo \"[백업 완료] $${FNAME}\";
          find /backups -name '*.sql.gz' -mtime +30 -delete;
        done
      "

volumes:
  postgres_data:
  redis_data:
